name: CI/CD Checks

on:
  pull_request:
    branches: [main]

jobs:
  # ----------------------
  # Continuous Integration
  # ----------------------
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint "**/*.js" --fix

      - name: Run Markdown Lint
        run: npx markdownlint "**/*.md"

      - name: Run Spell Check
        run: npx cspell "**/*.{md,js,json}"

  # -------------------------
  # Fake Continuous Deployment
  # -------------------------
  cd-fake:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Simulate Deployment
        run: |
          mkdir -p deploy
          echo "Deployed at $(date)" > deploy/DEPLOYED.txt
          echo "Fake deploy complete!"

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v3
        with:
          name: deploy-folder
          path: deploy/